<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de QR Code</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Générer un QR Code</h1>
        <label for="qrContent">Contenu :</label>
        <input type="text" id="qrContent" placeholder="Texte, nombre, URL…" required />

        <label for="email">Email :</label>
        <input type="email" id="email" placeholder="Entrez l'email" required />

        <div class="customization">
            <label>Couleur des carrés :</label>
            <div class="color-row">
                <input type="color" id="darkColor" value="#000000" />
                <input type="text" id="darkColorHex" class="hex-input" value="#000000" maxlength="7" placeholder="#000000" />
            </div>

            <label>Couleur du fond :</label>
            <div class="color-row">
                <input type="color" id="lightColor" value="#ffffff" />
                <input type="text" id="lightColorHex" class="hex-input" value="#ffffff" maxlength="7" placeholder="#ffffff" />
            </div>

            <label for="borderSize">Taille des bords : <span id="borderSizeValue">20</span> px</label>
            <input type="range" id="borderSize" min="0" max="100" value="20" />
        </div>

        <button onclick="generateQRCode()">Générer QR Code</button>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Chargement...</p>
        </div>

        <div id="qrCodeResult" class="qr-code-result"></div>

        <button id="downloadBtn" class="hidden" onclick="downloadQRCode()">Télécharger QR Code</button>
        <button id="resetBtn" class="hidden" onclick="resetForm()">Réinitialiser</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
